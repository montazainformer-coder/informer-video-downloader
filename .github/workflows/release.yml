name: Build release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build update package
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v', 'V')
          Set-Content -LiteralPath version.txt -Value $version -Encoding ASCII
          $files = @(
            'Downloader.ps1',
            'Apply-Update.ps1',
            'Start-Downloader.bat',
            'Video-Downloader.vbs',
            'INSTALL.bat',
            'UNINSTALL.bat',
            'Install-Shortcut.ps1',
            'Uninstall-Shortcut.ps1',
            'README.md',
            'version.txt'
          )
          Compress-Archive -LiteralPath $files -DestinationPath Video-Downloader-Update.zip -CompressionLevel Optimal
          $hash = (Get-FileHash -LiteralPath Video-Downloader-Update.zip -Algorithm SHA256).Hash
          Set-Content -LiteralPath Video-Downloader-Update.zip.sha256 -Value $hash -Encoding ASCII

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Video-Downloader-Update.zip
            Video-Downloader-Update.zip.sha256
